<style>
  .btn {
    background: blue;
    color: white;
    padding: 10px 20px;
    border: none;
  }

  .rounded-btn {
    background: green;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
  }

  .outline-btn {
    background: transparent;
    color: red;
    padding: 10px 20px;
    border: 2px solid red;
  }

  .hover-btn {
    background: blue;
    color: white;
    padding: 10px 20px;
    border: none;
  }

  .hover-btn:hover {
    background: darkblue;
  }
</style>
<button class="btn">Button</button>

<button class="rounded-btn">Rounded</button>

<button class="outline-btn">Outline</button>
<button class="hover-btn">Hover</button>
